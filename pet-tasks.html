<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Tasks • Ashok Tak</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
    
    :root {
      --accent: #15803d;
    }
    
    body {
      font-family: 'Inter', system_ui, sans-serif;
    }
    
    .font-display {
      font-family: 'Space Grotesk', 'Inter', system_ui, sans-serif;
      font-weight: 600;
    }

    .task-card {
      transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .task-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }

    .kanban-column {
      min-height: 520px;
    }

    .pet-accent {
      color: #15803d;
    }

    .priority-p0 { background: #fee2e2; color: #9f1239; }
    .priority-p1 { background: #fef3c7; color: #854d0e; }
    .priority-p2 { background: #dbeafe; color: #1e40af; }
    .priority-p3 { background: #f3e8ff; color: #6b21a8; }

    .project-chip {
      font-size: 10px;
      padding: 1px 9px;
      border-radius: 9999px;
      background: #272e3f;
      color: #cbd5e1;
      font-weight: 500;
    }

    .modal {
      animation: popIn 0.2s ease-out;
    }
    
    @keyframes popIn {
      from { transform: scale(0.96) translateY(10px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    .overdue {
      color: #f87171;
      font-weight: 600;
    }
    
    .due-soon {
      color: #fbbf24;
    }

    .status-pill {
      font-size: 10px;
      letter-spacing: .5px;
      font-weight: 700;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
  <div class="max-w-[1280px] mx-auto">
    <!-- Header -->
    <header class="border-b border-zinc-800 bg-zinc-950/95 backdrop-blur-lg sticky top-0 z-50">
      <div class="px-8 py-5 flex items-center justify-between">
        <div class="flex items-center gap-x-3">
          <div class="text-4xl">🐾</div>
          <div>
            <span class="font-display text-3xl tracking-tighter font-semibold">Pet Tasks</span>
            <span class="ml-2 text-sm text-emerald-400/70 font-medium">for pet projects</span>
          </div>
        </div>
        
        <div class="flex items-center gap-3">
          <button onclick="exportTasks()" 
                  class="px-4 py-2 text-sm flex items-center gap-2 rounded-2xl border border-zinc-700 hover:bg-zinc-900 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v-4m0 0l4 4m-4-4l4-4m12 0v4m0 0l-4-4m4 4l-4 4" />
            </svg>
            <span>Export</span>
          </button>
          <button onclick="importTasks()" 
                  class="px-4 py-2 text-sm flex items-center gap-2 rounded-2xl border border-zinc-700 hover:bg-zinc-900 transition-colors">
            <span>Import</span>
          </button>
          <button onclick="openModal()" 
                  class="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 transition-colors rounded-2xl text-sm font-semibold flex items-center gap-2">
            <span>+ New Task</span>
          </button>
        </div>
      </div>
    </header>

    <div class="px-8 pt-8 pb-16">
      <!-- Stats -->
      <div class="flex flex-wrap gap-3 mb-8" id="stats">
        <!-- Populated by JS -->
      </div>

      <!-- Filters -->
      <div class="flex flex-wrap items-center gap-3 mb-6">
        <input id="search-input" 
               oninput="applyFilters()"
               type="text" 
               placeholder="Search tasks, projects, or tags..." 
               class="flex-1 min-w-[240px] bg-zinc-900 border border-zinc-700 focus:border-emerald-600 outline-none rounded-3xl px-5 py-2.5 text-sm placeholder:text-zinc-500">

        <select id="project-filter" onchange="applyFilters()" 
                class="bg-zinc-900 border border-zinc-700 rounded-3xl px-4 py-2.5 text-sm min-w-[170px]">
          <option value="">All projects</option>
        </select>

        <div class="flex rounded-3xl overflow-hidden border border-zinc-700 text-sm" id="status-filters">
          <!-- JS populated buttons -->
        </div>

        <label class="flex items-center gap-2 bg-zinc-900 border border-zinc-700 rounded-3xl px-4 py-2 text-sm cursor-pointer">
          <input type="checkbox" id="overdue-filter" onchange="applyFilters()" class="accent-emerald-500">
          <span>Overdue only</span>
        </label>

        <button onclick="clearFilters()" 
                class="text-xs px-4 py-2 rounded-3xl text-zinc-400 hover:text-zinc-200 hover:bg-zinc-900">Clear all</button>
      </div>

      <!-- Kanban Board -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <!-- Todo -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-4 flex flex-col">
          <div class="flex items-center justify-between px-1 mb-3">
            <div class="flex items-center gap-2">
              <span class="font-semibold">Todo</span>
              <span id="count-todo" class="bg-zinc-800 text-xs px-2 py-px rounded-full text-zinc-400 font-mono"></span>
            </div>
          </div>
          <div id="column-todo" 
               ondrop="drop(event, 'todo')" 
               ondragover="allowDrop(event)"
               class="kanban-column flex-1 space-y-2 min-h-[520px] p-1 rounded-2xl">
          </div>
        </div>

        <!-- Doing -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-4 flex flex-col">
          <div class="flex items-center justify-between px-1 mb-3">
            <div class="flex items-center gap-2">
              <span class="font-semibold">In Progress</span>
              <span id="count-doing" class="bg-zinc-800 text-xs px-2 py-px rounded-full text-zinc-400 font-mono"></span>
            </div>
          </div>
          <div id="column-doing" 
               ondrop="drop(event, 'doing')" 
               ondragover="allowDrop(event)"
               class="kanban-column flex-1 space-y-2 min-h-[520px] p-1 rounded-2xl">
          </div>
        </div>

        <!-- Done -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-4 flex flex-col">
          <div class="flex items-center justify-between px-1 mb-3">
            <div class="flex items-center gap-2">
              <span class="font-semibold">Done</span>
              <span id="count-done" class="bg-zinc-800 text-xs px-2 py-px rounded-full text-zinc-400 font-mono"></span>
            </div>
          </div>
          <div id="column-done" 
               ondrop="drop(event, 'done')" 
               ondragover="allowDrop(event)"
               class="kanban-column flex-1 space-y-2 min-h-[520px] p-1 rounded-2xl">
          </div>
        </div>
      </div>

      <div class="mt-8 text-center">
        <p class="text-xs text-zinc-500">Data is saved in your browser only. Export regularly to back it up. 
          <span onclick="window.location.reload()" class="cursor-pointer hover:text-zinc-400">Refresh</span>
        </p>
      </div>
    </div>
  </div>

  <!-- Task Modal -->
  <div id="modal" onclick="if (event.target.id === 'modal') closeModal()" class="hidden fixed inset-0 bg-black/70 backdrop-blur flex items-start justify-center pt-[8vh] z-[200]">
    <div onclick="event.stopImmediatePropagation()" class="modal bg-zinc-900 border border-zinc-700 rounded-3xl w-full max-w-md mx-4">
      <div class="p-7">
        <div class="flex justify-between items-center mb-5">
          <h3 id="modal-title" class="font-semibold text-xl tracking-tight">New Task</h3>
          <button onclick="closeModal()" class="text-3xl leading-none text-zinc-500 hover:text-white -mr-2">×</button>
        </div>

        <form id="task-form" onsubmit="saveTask(event)">
          <input type="hidden" id="edit-id">

          <div class="space-y-4">
            <div>
              <label class="block text-xs text-zinc-400 mb-1.5 tracking-wider">TITLE</label>
              <input id="task-title" required class="w-full bg-zinc-950 rounded-2xl border border-zinc-700 px-4 py-[10px] text-sm" placeholder="Implement the cool feature">
            </div>

            <div>
              <label class="block text-xs text-zinc-400 mb-1.5 tracking-wider">DESCRIPTION</label>
              <textarea id="task-desc" rows="2" class="w-full bg-zinc-950 rounded-2xl border border-zinc-700 px-4 py-3 text-sm" placeholder="Notes..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs text-zinc-400 mb-1.5 tracking-wider">PROJECT</label>
                <select id="task-project" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-[10px] text-sm"></select>
              </div>
              <div>
                <label class="block text-xs text-zinc-400 mb-1.5 tracking-wider">PRIORITY</label>
                <select id="task-priority" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-[10px] text-sm">
                  <option value="p0">P0 — Critical</option>
                  <option value="p1" selected>P1 — High</option>
                  <option value="p2">P2 — Medium</option>
                  <option value="p3">P3 — Low</option>
                </select>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs text-zinc-400 mb-1.5 tracking-wider">DUE DATE</label>
                <input type="date" id="task-due" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-[9px] text-sm">
              </div>
              <div>
                <label class="block text-xs text-zinc-400 mb-1.5 tracking-wider">TAGS</label>
                <input id="task-tags" placeholder="ai, ui, backend" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-[10px] text-sm">
              </div>
            </div>
          </div>

          <div class="mt-7 flex items-center gap-3">
            <button type="button" id="delete-btn"
                    onclick="deleteCurrentTask()"
                    class="hidden flex-1 px-4 py-2.5 text-sm rounded-2xl border border-red-800 text-red-400 hover:bg-red-900/30">
              Delete
            </button>
            <button type="submit" 
                    class="flex-1 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 font-medium rounded-2xl text-sm">
              Save Task
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Tailwind script configuration
    function initTailwind() {
      document.documentElement.style.setProperty('--accent', '#15803d')
    }

    // Data
    let tasks = []
    let filters = {
      status: 'all',
      project: '',
      search: '',
      onlyOverdue: false
    }
    let editingId = null

    const PROJECTS = [
      'agent-platform', 'ledger', 'data-pipeline-template', 
      'ai-champ-demo', 'personal-website', 'tree-family', 
      'Tetris', 'pet-projects'
    ]

    const STATUS_LABELS = { todo: 'Todo', doing: 'In Progress', done: 'Done' }

    function loadFromStorage() {
      const stored = localStorage.getItem('pet-tasks-v1')
      if (stored) {
        tasks = JSON.parse(stored)
      } else {
        // Seed with real data
        tasks = [
          { id: uid(), title: "Add Ollama tool calling", description: "Wire new tools into the agent loop", project: "agent-platform", priority: "p0", dueDate: futureDate(1), status: "doing", tags: ["ai", "tools"], createdAt: now() },
          { id: uid(), title: "Polish transaction entry UX", description: "", project: "ledger", priority: "p1", dueDate: futureDate(4), status: "todo", tags: ["ux"], createdAt: now() },
          { id: uid(), title: "Improve data validation errors", description: "Better messages for bad CSV rows", project: "data-pipeline-template", priority: "p2", dueDate: futureDate(-2), status: "todo", tags: ["data"], createdAt: now() },
          { id: uid(), title: "Write docs for pet-tasks", description: "Add deployment instructions", project: "pet-projects", priority: "p1", dueDate: futureDate(0), status: "done", tags: ["docs"], createdAt: now() },
          { id: uid(), title: "Explore vector DB options", description: "", project: "ai-champ-demo", priority: "p2", dueDate: null, status: "todo", tags: ["research"], createdAt: now() }
        ]
        saveToStorage()
      }
    }

    function saveToStorage() {
      localStorage.setItem('pet-tasks-v1', JSON.stringify(tasks))
    }

    function uid() {
      return 't_' + Math.random().toString(36).slice(2, 10)
    }

    function now() {
      return new Date().toISOString()
    }

    function futureDate(offsetDays) {
      const d = new Date()
      d.setDate(d.getDate() + offsetDays)
      return d.toISOString().split('T')[0]
    }

    function isOverdue(task) {
      if (!task.dueDate || task.status === 'done') return false
      return task.dueDate < new Date().toISOString().split('T')[0]
    }

    function saveTask(e) {
      e.preventDefault()

      const title = document.getElementById('task-title').value.trim()
      if (!title) return

      const data = {
        title,
        description: document.getElementById('task-desc').value.trim(),
        project: document.getElementById('task-project').value,
        priority: document.getElementById('task-priority').value,
        dueDate: document.getElementById('task-due').value || null,
        tags: document.getElementById('task-tags').value
          .split(',').map(t => t.trim()).filter(Boolean)
      }

      if (editingId) {
        const task = tasks.find(t => t.id === editingId)
        Object.assign(task, data)
      } else {
        tasks.unshift({
          id: uid(),
          ...data,
          status: 'todo',
          createdAt: now()
        })
      }

      saveToStorage()
      closeModal()
      renderAll()
    }

    function deleteCurrentTask() {
      if (!editingId || !confirm('Delete this task permanently?')) return
      tasks = tasks.filter(t => t.id !== editingId)
      saveToStorage()
      closeModal()
      renderAll()
    }

    function openModal(taskId = null) {
      editingId = taskId
      const modal = document.getElementById('modal')
      const form = document.getElementById('task-form')
      const deleteBtn = document.getElementById('delete-btn')
      const titleEl = document.getElementById('modal-title')

      form.reset()
      deleteBtn.classList.toggle('hidden', !taskId)
      titleEl.textContent = taskId ? 'Edit Task' : 'New Task'

      // Populate projects
      const projectSel = document.getElementById('task-project')
      projectSel.innerHTML = PROJECTS.map(p => 
        `<option value="${p}">${p}</option>`
      ).join('')

      if (taskId) {
        const t = tasks.find(x => x.id === taskId)
        if (t) {
          document.getElementById('task-title').value = t.title
          document.getElementById('task-desc').value = t.description || ''
          projectSel.value = t.project
          document.getElementById('task-priority').value = t.priority
          document.getElementById('task-due').value = t.dueDate || ''
          document.getElementById('task-tags').value = (t.tags || []).join(', ')
        }
      } else {
        projectSel.value = 'pet-projects'
        document.getElementById('task-priority').value = 'p1'
      }

      modal.classList.remove('hidden')
      document.getElementById('task-title').focus()
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden')
      editingId = null
    }

    function cycleTask(id) {
      const t = tasks.find(x => x.id === id)
      if (!t) return
      const flow = ['todo', 'doing', 'done']
      t.status = flow[(flow.indexOf(t.status) + 1) % 3]
      saveToStorage()
      renderAll()
    }

    function deleteTask(id) {
      if (!confirm('Delete task?')) return
      tasks = tasks.filter(t => t.id !== id)
      saveToStorage()
      renderAll()
    }

    function editTask(id) {
      openModal(id)
    }

    // Drag and drop
    function allowDrop(ev) {
      ev.preventDefault()
    }

    function drag(ev, id) {
      ev.dataTransfer.setData("text", id)
    }

    function drop(ev, newStatus) {
      ev.preventDefault()
      const id = ev.dataTransfer.getData("text")
      const task = tasks.find(t => t.id === id)
      if (task && task.status !== newStatus) {
        task.status = newStatus
        saveToStorage()
        renderAll()
      }
    }

    // Rendering
    function renderStats() {
      const total = tasks.length
      const done = tasks.filter(t => t.status === 'done').length
      const overdue = tasks.filter(isOverdue).length

      document.getElementById('stats').innerHTML = `
        <div class="px-5 py-2.5 rounded-3xl bg-zinc-900 border border-zinc-800 text-sm flex items-baseline gap-x-2">
          <span class="text-zinc-400">Total</span> 
          <span class="font-semibold text-xl tabular-nums">${total}</span>
        </div>
        <div class="px-5 py-2.5 rounded-3xl bg-zinc-900 border border-zinc-800 text-sm flex items-baseline gap-x-2">
          <span class="text-zinc-400">Completed</span> 
          <span class="font-semibold text-xl tabular-nums text-emerald-400">${done}</span>
        </div>
        <div class="px-5 py-2.5 rounded-3xl bg-zinc-900 border border-zinc-800 text-sm flex items-baseline gap-x-2">
          <span class="text-zinc-400">Overdue</span> 
          <span class="font-semibold text-xl tabular-nums ${overdue > 0 ? 'text-red-400' : ''}">${overdue}</span>
        </div>
      `
    }

    function renderFilters() {
      // Projects dropdown
      const projSel = document.getElementById('project-filter')
      const current = projSel.value
      const uniqueProjects = [...new Set(tasks.map(t => t.project))].sort()
      
      let html = `<option value="">All projects</option>`
      uniqueProjects.forEach(p => {
        html += `<option value="${p}" ${current === p ? 'selected' : ''}>${p}</option>`
      })
      projSel.innerHTML = html

      // Status pills
      const container = document.getElementById('status-filters')
      const statuses = ['all', 'todo', 'doing', 'done']
      container.innerHTML = statuses.map(s => {
        const isActive = filters.status === s
        const label = s === 'all' ? 'All' : STATUS_LABELS[s] || s
        return `
          <button onclick="setStatusFilter('${s}')" 
                  class="px-5 py-[7px] text-sm transition-colors ${isActive ? 'bg-zinc-800 text-white' : 'hover:bg-zinc-800 text-zinc-400'}">
            ${label}
          </button>
        `
      }).join('')
    }

    function setStatusFilter(status) {
      filters.status = status
      renderAll()
    }

    function applyFilters() {
      filters.search = document.getElementById('search-input').value.toLowerCase().trim()
      filters.project = document.getElementById('project-filter').value
      filters.onlyOverdue = document.getElementById('overdue-filter').checked
      renderBoard()
    }

    function clearFilters() {
      filters = { status: 'all', project: '', search: '', onlyOverdue: false }
      document.getElementById('search-input').value = ''
      document.getElementById('project-filter').value = ''
      document.getElementById('overdue-filter').checked = false
      renderAll()
    }

    function getFilteredTasks() {
      return tasks.filter(task => {
        // status
        if (filters.status !== 'all' && task.status !== filters.status) return false
        
        // project
        if (filters.project && task.project !== filters.project) return false
        
        // overdue
        if (filters.onlyOverdue && !isOverdue(task)) return false
        
        // search
        if (filters.search) {
          const text = `${task.title} ${task.description} ${task.project} ${task.tags.join(' ')}`.toLowerCase()
          if (!text.includes(filters.search)) return false
        }
        return true
      })
    }

    function renderBoard() {
      const filtered = getFilteredTasks()

      const columns = {
        todo: filtered.filter(t => t.status === 'todo'),
        doing: filtered.filter(t => t.status === 'doing'),
        done: filtered.filter(t => t.status === 'done')
      }

      Object.keys(columns).forEach(status => {
        const container = document.getElementById(`column-${status}`)
        const countEl = document.getElementById(`count-${status}`)
        
        countEl.textContent = columns[status].length

        if (columns[status].length === 0) {
          container.innerHTML = `
            <div class="h-32 border border-dashed border-zinc-700 rounded-3xl flex items-center justify-center text-xs text-zinc-500">
              No tasks
            </div>
          `
          return
        }

        container.innerHTML = columns[status].map(task => {
          const overdue = isOverdue(task)
          const due = task.dueDate ? new Date(task.dueDate).toLocaleDateString('en-US', {month:'short', day:'numeric'}) : ''
          
          return `
            <div class="task-card bg-zinc-950 border border-zinc-700 rounded-2xl p-4 text-sm group" 
                 draggable="true" 
                 ondragstart="drag(event, '${task.id}')">
              
              <div class="flex justify-between gap-2">
                <div class="font-medium pr-2 leading-snug text-zinc-100">${task.title}</div>
                
                <div class="flex flex-col items-end text-[10px] shrink-0">
                  ${due ? `<span class="${overdue ? 'overdue' : (task.dueDate < futureDate(3) ? 'due-soon' : '')}">${due}</span>` : ''}
                  ${overdue ? `<span class="text-red-400 text-[9px]">OVERDUE</span>` : ''}
                </div>
              </div>

              ${task.description ? `<div class="text-xs mt-1.5 text-zinc-400 line-clamp-2">${task.description}</div>` : ''}

              <div class="flex flex-wrap items-center mt-3 gap-x-1 gap-y-1">
                <span class="project-chip">${task.project}</span>
                <span class="status-pill px-2 py-px rounded-full priority-${task.priority}">${task.priority.toUpperCase()}</span>
                
                ${task.tags.map(tag => `<span class="px-1.5 py-px text-[10px] bg-zinc-800 text-zinc-400 rounded">${tag}</span>`).join('')}
              </div>

              <div class="mt-3 flex gap-1 text-[11px] opacity-70">
                <button onclick="editTask('${task.id}')" class="hover:text-emerald-400 hover:opacity-100 px-2 py-0.5 rounded">edit</button>
                <button onclick="cycleTask('${task.id}')" class="hover:text-emerald-400 hover:opacity-100 px-2 py-0.5 rounded">cycle</button>
                <button onclick="deleteTask('${task.id}')" class="hover:text-red-400 hover:opacity-100 px-2 py-0.5 rounded">delete</button>
              </div>
            </div>
          `
        }).join('')
      })
    }

    function renderAll() {
      renderStats()
      renderFilters()
      renderBoard()
    }

    // Export / Import
    function exportTasks() {
      const dataStr = JSON.stringify(tasks, null, 2)
      const blob = new Blob([dataStr], { type: "application/json" })
      const url = URL.createObjectURL(blob)
      const link = document.createElement("a")
      link.href = url
      link.download = `pet-tasks-${new Date().toISOString().slice(0,10)}.json`
      link.click()
      URL.revokeObjectURL(url)
    }

    function importTasks() {
      const input = document.createElement('input')
      input.type = 'file'
      input.accept = '.json'
      input.onchange = function() {
        const file = input.files[0]
        const reader = new FileReader()
        reader.onload = function(e) {
          try {
            const imported = JSON.parse(e.target.result)
            if (Array.isArray(imported)) {
              tasks = imported
              saveToStorage()
              renderAll()
              alert('Tasks imported successfully!')
            }
          } catch(err) {
            alert('Failed to import. Is it valid JSON?')
          }
        }
        reader.readAsText(file)
      }
      input.click()
    }

    // Keyboard shortcuts
    function setupKeyboard() {
      document.addEventListener('keydown', function(e) {
        if (e.key === '/' && document.activeElement.tagName === 'BODY') {
          e.preventDefault()
          document.getElementById('search-input').focus()
        }
        if (e.key.toLowerCase() === 'n' && document.activeElement.tagName === 'BODY') {
          e.preventDefault()
          openModal()
        }
        if (e.key === 'Escape') {
          const modal = document.getElementById('modal')
          if (!modal.classList.contains('hidden')) {
            closeModal()
          }
        }
      })

      // Hint in console
      console.log('%c[Pet Tasks] Keyboard: Press / to focus search • N for new task', 'color:#3f3f46')
    }

    function initProjectFilterListener() {
      document.getElementById('project-filter').addEventListener('change', applyFilters)
      document.getElementById('overdue-filter').addEventListener('change', applyFilters)
    }

    // Initialisation
    function init() {
      initTailwind()
      loadFromStorage()

      // Seed project filter options
      const projFilter = document.getElementById('project-filter')
      PROJECTS.forEach(p => {
        const opt = document.createElement('option')
        opt.value = p
        opt.textContent = p
        projFilter.appendChild(opt)
      })

      // Status filter buttons initial render
      renderAll()
      initProjectFilterListener()
      setupKeyboard()

      // Make sure search also triggers filter
      document.getElementById('search-input').addEventListener('input', applyFilters)

      // Optional: show hint
      console.log('%c[Pet Tasks] Ready. Deploy this file to ashoktak.github.io', 'color:#444')
    }

    window.onload = init
  </script>
</body>
</html>
